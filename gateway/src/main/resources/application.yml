# gateway/src/main/resources/application.yml
# Spring Cloud Gateway Server WebMVC (servlet) — the single front door. Routes by a service prefix and
# strips it before forwarding, so external /cif/api/customers/1 → cif's /api/customers/1.
# (Config prefix is spring.cloud.gateway.server.webmvc.* since Spring Cloud 2025; the old
#  spring.cloud.gateway.mvc.* is deprecated.)
spring:
  application:
    name: gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: cif
              uri: ${services.cif.uri:http://localhost:8081}
              predicates:
                - Path=/cif/**
              filters:
                - StripPrefix=1                          # /cif/api/customers/1 → /api/customers/1
                - AddResponseHeader=X-Gateway, build-a-bank
            - id: demand-account
              uri: ${services.demand-account.uri:http://localhost:8082}
              predicates:
                - Path=/bank/**
              filters:
                - StripPrefix=1                          # /bank/api/v1/transfers → /api/v1/transfers
                - AddResponseHeader=X-Gateway, build-a-bank
            # Step 29: front the auth service so the React app has ONE base URL (the gateway). Auth's own
            # paths already start with /api/auth, so we DON'T strip — /api/auth/login → auth's /api/auth/login.
            # ⚠️ Step 32: NO-STRIP is now load-bearing for the refresh cookie: its Path=/api/auth matches the
            # browser-visible path ONLY because the gateway forwards it verbatim. Add StripPrefix here and
            # the cookie silently stops being sent — refresh dies with 401s.
            - id: auth
              uri: ${services.auth.uri:http://localhost:8083}
              predicates:
                - Path=/api/auth/**
              filters:
                - AddResponseHeader=X-Gateway, build-a-bank
            # Step 30: front the notification service too, so the SPA's SSE stream uses the same single origin
            # (the gateway's CORS then covers it). /notifications/api/notifications/stream → notification's
            # /api/notifications/stream. (SSE through a servlet gateway may buffer — noted in the lesson.)
            - id: notification
              uri: ${services.notification.uri:http://localhost:8084}
              predicates:
                - Path=/notifications/**
              filters:
                - StripPrefix=1                          # /notifications/api/notifications → /api/notifications
                - AddResponseHeader=X-Gateway, build-a-bank
            # Step 32: the shipped topology — the gateway serves the SPA too (one origin for app + API, so
            # no CORS and the SameSite cookie just works). Forwards to the nginx container from
            # frontend/Dockerfile. NO StripPrefix: nginx must see /assets/chunk.js verbatim.
            # ⚠️ ORDER IS LOAD-BEARING: the MVC gateway matches routes strictly by LIST POSITION (first match
            # wins; RouteProperties' `order` attribute is silently ignored — spring-cloud-gateway#3495). This
            # catch-all MUST stay the last route, after every service prefix. Side effect: unknown paths now
            # return the SPA's index.html (200), not 404 — SPA routes must never collide with the four
            # service prefixes above. (The gateway's own /actuator/* endpoints still win: their handler
            # mapping runs at order -100, before route matching at order 3.)
            - id: spa
              uri: ${services.spa.uri:http://localhost:5175}
              predicates:
                - Path=/**
              filters:
                - AddResponseHeader=X-Gateway, build-a-bank

server:
  port: 8080                                             # the gateway is the front door

# Step 29: CORS so the React dev app (Vite, http://localhost:5173) can call the gateway from the browser.
# Comma-separated origins; override per environment (tighten/replace in prod). Consumed by GatewayCorsConfig.
app:
  security:
    cors:
      allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway                     # /actuator/gateway lists the routes

logging:
  level:
    com.buildabank.gateway: INFO
